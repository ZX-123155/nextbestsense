arm:
  arm_joint_controller:
    type: "position_controllers/JointTrajectoryController"
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6

    constraints:
      goal_time: 1.0
      stopped_velocity_tolerance: 0.02
      joint1: {trajectory: 0.02, goal: 0.01}
      joint2: {trajectory: 0.02, goal: 0.01}
      joint3: {trajectory: 0.02, goal: 0.01}
      joint4: {trajectory: 0.02, goal: 0.01}
      joint5: {trajectory: 0.02, goal: 0.01}
      joint6: {trajectory: 0.02, goal: 0.01}

    gains:
      joint1:   {p: 1000.0, i: 0.0, d: 0.1, i_clamp: 0.0}
      joint2:   {p: 1000.0, i: 0.0, d: 0.1, i_clamp: 0.0}
      joint3:   {p: 1000.0, i: 0.0, d: 0.1, i_clamp: 0.0}
      joint4:   {p: 1000.0, i: 0.0, d: 0.1, i_clamp: 0.0}
      joint5:   {p: 1000.0, i: 0.0, d: 0.1, i_clamp: 0.0}
      joint6:   {p: 1000.0, i: 0.0, d: 0.1, i_clamp: 0.0}

